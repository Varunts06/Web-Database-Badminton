openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SmashTrack - Badminton Match Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: players
  - name: sessions
  - name: matches
  - name: bets
  - name: courtBookings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /players:
    get:
      operationId: getPlayers
      tags: [players]
      summary: Get all players
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create a new player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerRequest"
      responses:
        "201":
          description: Player created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/{id}:
    get:
      operationId: getPlayer
      tags: [players]
      summary: Get a player by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Player found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update player name or balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlayerRequest"
      responses:
        "200":
          description: Player updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /sessions:
    get:
      operationId: getSessions
      tags: [sessions]
      summary: Get all game sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new game session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get session details with matches
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session with matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
    patch:
      operationId: updateSession
      tags: [sessions]
      summary: Update session details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSessionRequest"
      responses:
        "200":
          description: Session updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session and all its matches (reverses bets)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /matches:
    post:
      operationId: createMatch
      tags: [matches]
      summary: Create a new match within a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMatchRequest"
      responses:
        "201":
          description: Match created and bets settled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{id}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get a match by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"
    delete:
      operationId: deleteMatch
      tags: [matches]
      summary: Delete a match and reverse its bets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted and bets reversed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /bets:
    get:
      operationId: getBets
      tags: [bets]
      summary: Get all bets / balance transactions
      responses:
        "200":
          description: List of bets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bet"

  /court-bookings:
    get:
      operationId: getCourtBookings
      tags: [courtBookings]
      summary: Get all court bookings
      responses:
        "200":
          description: List of court bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourtBooking"
    post:
      operationId: createCourtBooking
      tags: [courtBookings]
      summary: Create a court booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCourtBookingRequest"
      responses:
        "201":
          description: Court booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourtBooking"

  /court-bookings/{id}:
    delete:
      operationId: deleteCourtBooking
      tags: [courtBookings]
      summary: Delete a court booking and reverse fees
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted and fees reversed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    Player:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        balance:
          type: number
        betBalance:
          type: number
        courtBalance:
          type: number
        isFixed:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - balance
        - betBalance
        - courtBalance
        - isFixed
        - createdAt

    CreatePlayerRequest:
      type: object
      properties:
        name:
          type: string
        isFixed:
          type: boolean
      required:
        - name

    UpdatePlayerRequest:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
        description:
          type: string

    Session:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        playerIds:
          type: array
          items:
            type: integer
        playerNames:
          type: array
          items:
            type: string
        guestPlayerName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - date
        - playerIds
        - playerNames
        - createdAt

    CreateSessionRequest:
      type: object
      properties:
        date:
          type: string
        playerIds:
          type: array
          items:
            type: integer
        guestPlayerName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - date
        - playerIds

    UpdateSessionRequest:
      type: object
      properties:
        date:
          type: string
        playerIds:
          type: array
          items:
            type: integer
        guestPlayerName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true

    SessionDetail:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        playerIds:
          type: array
          items:
            type: integer
        playerNames:
          type: array
          items:
            type: string
        guestPlayerName:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
      required:
        - id
        - date
        - playerIds
        - playerNames
        - createdAt
        - matches

    Match:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        team1Player1Id:
          type: integer
        team1Player2Id:
          type: integer
        team2Player1Id:
          type: integer
        team2Player2Id:
          type: integer
        team1Player1Name:
          type: string
        team1Player2Name:
          type: string
        team2Player1Name:
          type: string
        team2Player2Name:
          type: string
        winnerTeam:
          type: integer
          nullable: true
        betAmount:
          type: number
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - team1Player1Id
        - team1Player2Id
        - team2Player1Id
        - team2Player2Id
        - team1Player1Name
        - team1Player2Name
        - team2Player1Name
        - team2Player2Name
        - betAmount
        - createdAt

    CreateMatchRequest:
      type: object
      properties:
        sessionId:
          type: integer
        team1Player1Id:
          type: integer
        team1Player2Id:
          type: integer
        team2Player1Id:
          type: integer
        team2Player2Id:
          type: integer
        winnerTeam:
          type: integer
          nullable: true
        betAmount:
          type: number
      required:
        - sessionId
        - team1Player1Id
        - team1Player2Id
        - team2Player1Id
        - team2Player2Id
        - betAmount

    Bet:
      type: object
      properties:
        id:
          type: integer
        matchId:
          type: integer
          nullable: true
        courtBookingId:
          type: integer
          nullable: true
        fromPlayerId:
          type: integer
        toPlayerId:
          type: integer
        fromPlayerName:
          type: string
        toPlayerName:
          type: string
        amount:
          type: number
        description:
          type: string
        createdAt:
          type: string
      required:
        - id
        - fromPlayerId
        - toPlayerId
        - fromPlayerName
        - toPlayerName
        - amount
        - description
        - createdAt

    CourtBooking:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
          nullable: true
        payerId:
          type: integer
        payerName:
          type: string
        totalAmount:
          type: number
        splitAmount:
          type: number
        player1Id:
          type: integer
        player2Id:
          type: integer
        player3Id:
          type: integer
        player4Id:
          type: integer
        player1Name:
          type: string
        player2Name:
          type: string
        player3Name:
          type: string
        player4Name:
          type: string
        debts:
          type: array
          items:
            $ref: "#/components/schemas/CourtDebt"
        date:
          type: string
        createdAt:
          type: string
      required:
        - id
        - payerId
        - payerName
        - totalAmount
        - splitAmount
        - player1Id
        - player2Id
        - player3Id
        - player4Id
        - player1Name
        - player2Name
        - player3Name
        - player4Name
        - debts
        - date
        - createdAt

    CourtDebt:
      type: object
      properties:
        fromPlayerName:
          type: string
        toPlayerName:
          type: string
        amount:
          type: number
      required:
        - fromPlayerName
        - toPlayerName
        - amount

    CreateCourtBookingRequest:
      type: object
      properties:
        sessionId:
          type: integer
          nullable: true
        payerId:
          type: integer
        player1Id:
          type: integer
        player2Id:
          type: integer
        player3Id:
          type: integer
        player4Id:
          type: integer
        totalAmount:
          type: number
        date:
          type: string
      required:
        - payerId
        - player1Id
        - player2Id
        - player3Id
        - player4Id
        - totalAmount
        - date
